openapi: 3.0.0
info:
  title: Ecom API
  description: A full-featured E-commerce API supporting User Authentication, Cart Management, Orders, and Product Cataloging.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
  schemas:
    User:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        date_of_birth:
          type: string
          format: date
        role:
          type: string
          enum: [user, admin]
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        image:
          type: string
        weight:
          type: number
        description:
          type: string
    Order:
      type: object
      properties:
        shipping_price:
          type: number
        street_address:
          type: string
        city:
          type: string
        country:
          type: string

paths:
  /register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        201:
          description: User created
        400:
          description: Validation error or user exists

  /login:
    post:
      summary: Authenticate user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Logged in successfully

  /users:
    get:
      summary: Get all users (Admin only)
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        200:
          description: List of users

  /product:
    get:
      summary: List all products
      tags: [Products]
      responses:
        200:
          description: Array of products
    post:
      summary: Add a new product (Admin only)
      tags: [Products]
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        200:
          description: Product added

  /cart:
    get:
      summary: View current user's cart
      tags: [Cart]
      security:
        - cookieAuth: []
      responses:
        200:
          description: Cart contents with product details
  
  /cart/addproduct:
    post:
      summary: Add item to cart
      tags: [Cart]
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                item_id:
                  type: integer
      responses:
        200:
          description: Item added

  /cart/checkout:
    post:
      summary: Convert cart to an order
      tags: [Cart]
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        200:
          description: Order created and cart cleared

  /catagories:
    get:
      summary: Get all categories
      tags: [Categories]
      responses:
        200:
          description: List of categories

  /orders/{id}:
    get:
      summary: Get order details
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      security:
        - cookieAuth: []
      responses:
        200:
          description: Order data